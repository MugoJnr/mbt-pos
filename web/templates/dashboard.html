<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>MBT POS — Web Dashboard</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f5f7;--surface:#ffffff;--surface2:#f9fafb;
  --border:#e5e7eb;--border2:#d1d5db;
  --text:#111827;--text2:#6b7280;--text3:#9ca3af;
  --gold:#f59e0b;--gold-dim:#fef3c7;
  --ok:#10b981;--ok-dim:#d1fae5;
  --err:#ef4444;--err-dim:#fee2e2;
  --warn:#f59e0b;--warn-dim:#fef3c7;
  --info:#3b82f6;--info-dim:#dbeafe;
  --accent:#1d4ed8;--accent-dim:#dbeafe;
  --nav-w:240px;--topbar-h:56px;
  --radius:10px;--shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 6px -1px rgba(0,0,0,.08),0 2px 4px -1px rgba(0,0,0,.04);
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px;color:var(--text);background:var(--bg)}
a{color:inherit;text-decoration:none}
button{cursor:pointer;font-family:inherit;font-size:14px;border:none;outline:none}
input,select,textarea{font-family:inherit;font-size:14px;outline:none;border:1px solid var(--border2);border-radius:8px;padding:8px 12px;background:var(--surface);color:var(--text);width:100%;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
table{border-collapse:collapse;width:100%}
th{font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--text2);text-align:left;padding:10px 14px;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:12px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}

/* ── LAYOUT ── */
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{width:var(--nav-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;z-index:100;transition:transform .25s}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#topbar{height:var(--topbar-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0}
#content{flex:1;overflow-y:auto;padding:24px}

/* ── SIDEBAR ── */
.sb-logo{padding:18px 20px 12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.sb-logo-icon{width:32px;height:32px;background:var(--accent);border-radius:8px;display:grid;place-items:center;color:#fff;font-weight:700;font-size:14px;flex-shrink:0}
.sb-logo-text{font-weight:700;font-size:15px;line-height:1.2}
.sb-logo-sub{font-size:11px;color:var(--text3)}
.sb-nav{flex:1;padding:12px 10px;overflow-y:auto}
.sb-section{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);padding:8px 10px 4px;margin-top:4px}
.nav-btn{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;color:var(--text2);background:none;border:none;width:100%;text-align:left;font-size:13.5px;font-weight:500;transition:all .15s;cursor:pointer}
.nav-btn:hover{background:var(--surface2);color:var(--text)}
.nav-btn.active{background:var(--accent-dim);color:var(--accent);font-weight:600}
.nav-btn .icon{width:18px;text-align:center;font-size:15px;flex-shrink:0}
.nav-btn .badge{margin-left:auto;background:var(--err);color:#fff;border-radius:10px;font-size:10px;padding:1px 6px;font-weight:700}
.sb-user{padding:14px 16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-avatar{width:32px;height:32px;background:var(--accent);border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:700;font-size:13px;flex-shrink:0}
.sb-user-info{min-width:0}
.sb-user-name{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-user-role{font-size:11px;color:var(--text3)}
.sb-logout{margin-left:auto;background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:4px;border-radius:6px;transition:color .15s}
.sb-logout:hover{color:var(--err)}

/* ── TOPBAR ── */
.tb-menu{display:none;background:none;border:none;font-size:20px;color:var(--text2);padding:4px;border-radius:6px}
.tb-title{font-weight:700;font-size:16px;flex:1}
.tb-badge{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--ok);background:var(--ok-dim);padding:4px 10px;border-radius:20px}
.tb-badge.offline{color:var(--err);background:var(--err-dim)}
.tb-badge.live{color:#059669;background:#d1fae5}
.tb-badge.polling{color:var(--warn);background:var(--warn-dim)}
.tb-time{font-size:12px;color:var(--text3);white-space:nowrap}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
.card-body{padding:20px}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.card-title{font-weight:700;font-size:15px}
.card-action{margin-left:auto}

/* ── KPI CARDS ── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow)}
.kpi-label{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.kpi-value{font-size:26px;font-weight:800;line-height:1;margin-bottom:4px}
.kpi-sub{font-size:12px;color:var(--text3)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-weight:600;font-size:13.5px;border:none;transition:all .15s;cursor:pointer;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#1e40af}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border2)}.btn-secondary:hover{background:var(--surface2)}
.btn-danger{background:var(--err);color:#fff}.btn-danger:hover{background:#dc2626}
.btn-success{background:var(--ok);color:#fff}.btn-success:hover{background:#059669}
.btn-sm{padding:5px 12px;font-size:12.5px;border-radius:7px}
.btn-icon{padding:6px 8px}

/* ── BADGES ── */
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700}
.badge-ok{background:var(--ok-dim);color:#065f46}
.badge-err{background:var(--err-dim);color:#991b1b}
.badge-warn{background:var(--warn-dim);color:#92400e}
.badge-info{background:var(--info-dim);color:#1e40af}
.badge-gray{background:#f3f4f6;color:#374151}

/* ── FORMS ── */
.form-group{margin-bottom:16px}
.form-label{display:block;font-weight:600;font-size:13px;margin-bottom:6px;color:var(--text)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-hint{font-size:11px;color:var(--text3);margin-top:4px}
.input-prefix{display:flex;align-items:center;gap:0}
.input-prefix-text{background:var(--surface2);border:1px solid var(--border2);border-right:none;border-radius:8px 0 0 8px;padding:8px 10px;color:var(--text2);white-space:nowrap}
.input-prefix input{border-radius:0 8px 8px 0}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:none;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.2);width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.modal-title{font-weight:700;font-size:16px;flex:1}
.modal-close{background:none;border:none;font-size:20px;color:var(--text3);cursor:pointer;padding:2px 6px;border-radius:6px}
.modal-close:hover{color:var(--err)}
.modal-body{padding:20px 24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}

/* ── TOAST ── */
#toast-container{position:fixed;bottom:20px;right:20px;z-index:2000;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--text);color:#fff;padding:12px 18px;border-radius:10px;font-size:13.5px;font-weight:500;box-shadow:var(--shadow-md);animation:toast-in .2s ease;max-width:320px}
.toast.ok{background:var(--ok)}.toast.err{background:var(--err)}.toast.warn{background:var(--warn)}
@keyframes toast-in{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── LOGIN ── */
#login-screen{position:fixed;inset:0;background:#f4f5f7;display:flex;align-items:center;justify-content:center;z-index:500;padding:16px}
.login-card{background:var(--surface);border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.12);width:100%;max-width:400px;padding:40px 36px}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:32px}
.login-logo-icon{width:44px;height:44px;background:var(--accent);border-radius:12px;display:grid;place-items:center;color:#fff;font-weight:800;font-size:18px}
.login-logo-text{font-weight:800;font-size:20px}
.login-logo-sub{font-size:12px;color:var(--text3);margin-top:1px}
.login-error{background:var(--err-dim);color:#991b1b;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none}
.login-btn{width:100%;padding:12px;font-size:15px;font-weight:700;background:var(--accent);color:#fff;border:none;border-radius:10px;cursor:pointer;transition:background .15s;margin-top:8px}
.login-btn:hover{background:#1e40af}
.login-btn:disabled{opacity:.6;cursor:not-allowed}

/* ── SEARCH ── */
.search-bar{position:relative}
.search-bar input{padding-left:34px}
.search-bar::before{content:"⌕";position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:16px;pointer-events:none}

/* ── TABLE WRAPPERS ── */
.table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border)}
.table-wrap table{min-width:600px}
.table-actions{display:flex;gap:6px}

/* ── FILTER BAR ── */
.filter-bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.filter-bar select,.filter-bar input[type=date]{width:auto;min-width:130px}

/* ── STAT ROW ── */
.stat-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.stat-row:last-child{border-bottom:none}
.stat-label{font-size:13px;color:var(--text2)}
.stat-value{font-weight:700;font-size:14px}

/* ── TABS ── */
.tab-bar{display:flex;border-bottom:1px solid var(--border);margin-bottom:20px;gap:4px}
.tab-btn{padding:10px 18px;background:none;border:none;border-bottom:2px solid transparent;color:var(--text2);font-weight:600;font-size:13.5px;cursor:pointer;transition:all .15s;margin-bottom:-1px}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-btn:hover{color:var(--text)}
.tab-pane{display:none}.tab-pane.active{display:block}

/* ── POS GRID ── */
.pos-layout{display:grid;grid-template-columns:1fr 360px;gap:0;height:calc(100vh - var(--topbar-h) - 48px);overflow:hidden}
.pos-left{overflow-y:auto;padding:16px}
.pos-right{border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:var(--surface)}
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.prod-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:all .15s;text-align:center}
.prod-card:hover{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
.prod-card.out{opacity:.45;cursor:not-allowed}
.prod-card-name{font-weight:600;font-size:13px;margin-bottom:6px;word-break:break-word}
.prod-card-price{font-size:16px;font-weight:800;color:var(--accent)}
.prod-card-stock{font-size:11px;color:var(--text3);margin-top:4px}
.prod-card-stock.low{color:var(--err)}
.cart-area{flex:1;overflow-y:auto;padding:16px}
.cart-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
.cart-item:last-child{border-bottom:none}
.cart-item-name{flex:1;font-size:13px;font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cart-qty{display:flex;align-items:center;gap:4px}
.qty-btn{width:24px;height:24px;border-radius:6px;border:1px solid var(--border2);background:var(--surface2);font-size:14px;font-weight:700;display:grid;place-items:center;cursor:pointer;transition:all .15s}
.qty-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.qty-input{width:40px;text-align:center;padding:4px;font-size:13px;font-weight:700;border:1px solid var(--border2);border-radius:6px}
.cart-total-line{font-size:13px;font-weight:600;color:var(--accent);min-width:72px;text-align:right}
.cart-rm{background:none;border:none;color:var(--text3);font-size:16px;cursor:pointer;padding:2px 4px;border-radius:4px}
.cart-rm:hover{color:var(--err)}
.checkout-panel{border-top:1px solid var(--border);padding:14px 16px;background:var(--surface2)}
.totals-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}
.total-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:13px}
.total-row.grand{font-weight:800;font-size:20px;color:var(--accent);padding-top:8px;border-top:1px solid var(--border);margin-top:6px}
.pay-row{display:flex;gap:8px;margin-bottom:10px;align-items:center}
.pay-row label{font-weight:600;font-size:12px;color:var(--text2);white-space:nowrap;min-width:60px}
.quick-amounts{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.quick-btn{flex:1;min-width:50px;padding:6px 4px;background:var(--surface);border:1px solid var(--border2);border-radius:7px;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;transition:all .15s;text-align:center}
.quick-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}

/* ── MOBILE ── */
@media(max-width:768px){
  #sidebar{position:fixed;top:0;bottom:0;left:0;transform:translateX(-100%)}
  #sidebar.open{transform:none;box-shadow:4px 0 32px rgba(0,0,0,.15)}
  .tb-menu{display:block}
  #sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99;display:none}
  #sidebar-overlay.open{display:block}
  .pos-layout{grid-template-columns:1fr;grid-template-rows:auto 1fr}
  .pos-right{height:420px;border-left:none;border-top:1px solid var(--border)}
  .kpi-grid{grid-template-columns:1fr 1fr}
  .form-row{grid-template-columns:1fr}
  #content{padding:16px}
  .filter-bar{gap:8px}
}
@media(max-width:480px){
  .kpi-grid{grid-template-columns:1fr}
  .login-card{padding:28px 20px}
}

/* ── SPINNER ── */
.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-center{display:flex;justify-content:center;align-items:center;padding:60px;gap:12px;color:var(--text2)}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-text{font-size:14px}

/* ── CHART BAR ── */
.mini-bar-wrap{display:flex;align-items:center;gap:8px;padding:4px 0}
.mini-bar-label{font-size:12px;color:var(--text2);min-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mini-bar-track{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.mini-bar-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .5s}
.mini-bar-val{font-size:12px;font-weight:700;min-width:80px;text-align:right}

/* ── DEBT STATUS ── */
.debt-status-pending{background:#fef3c7;color:#92400e}
.debt-status-partial{background:#dbeafe;color:#1e40af}
.debt-status-paid{background:#d1fae5;color:#065f46}
.debt-status-overdue{background:#fee2e2;color:#991b1b}
.debt-status-cancelled{background:#f3f4f6;color:#374151}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">M</div>
      <div>
        <div class="login-logo-text">MBT POS</div>
        <div class="login-logo-sub">MugoByte Technologies · Web Dashboard</div>
      </div>
    </div>
    <div class="login-error" id="login-error"></div>
    <div class="form-group">
      <label class="form-label">Username</label>
      <input type="text" id="login-user" placeholder="admin" autocomplete="username">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="login-btn" id="login-btn" onclick="doLogin()">Sign In</button>
  </div>
</div>

<!-- SIDEBAR OVERLAY -->
<div id="sidebar-overlay" onclick="closeSidebar()"></div>

<!-- APP -->
<div id="app" style="display:none">
  <!-- Sidebar -->
  <nav id="sidebar">
    <div class="sb-logo">
      <div class="sb-logo-icon">M</div>
      <div>
        <div class="sb-logo-text">MBT POS</div>
        <div class="sb-logo-sub">Web Dashboard</div>
      </div>
    </div>
    <div class="sb-nav">
      <div class="sb-section">Main</div>
      <button class="nav-btn active" onclick="goto('dashboard')" id="nav-dashboard">
        <span class="icon">⊞</span> Dashboard
      </button>
      <button class="nav-btn" onclick="goto('pos')" id="nav-pos">
        <span class="icon">⊕</span> Point of Sale
      </button>
      <div class="sb-section">Management</div>
      <button class="nav-btn" onclick="goto('inventory')" id="nav-inventory">
        <span class="icon">▤</span> Inventory
      </button>
      <button class="nav-btn" onclick="goto('debt')" id="nav-debt">
        <span class="icon">💳</span> Debt Management
      </button>
      <button class="nav-btn" onclick="goto('reports')" id="nav-reports">
        <span class="icon">▦</span> Reports
      </button>
      <div class="sb-section">System</div>
      <button class="nav-btn" onclick="goto('users')" id="nav-users">
        <span class="icon">⊛</span> Users
      </button>
      <button class="nav-btn" onclick="goto('settings')" id="nav-settings">
        <span class="icon">⚙</span> Settings
      </button>
    </div>
    <div class="sb-user">
      <div class="sb-avatar" id="sb-avatar">A</div>
      <div class="sb-user-info">
        <div class="sb-user-name" id="sb-username">Admin</div>
        <div class="sb-user-role" id="sb-role">Super Admin</div>
      </div>
      <button class="sb-logout" onclick="logout()" title="Sign out">⏻</button>
    </div>
  </nav>

  <!-- Main -->
  <div id="main">
    <div id="topbar">
      <button class="tb-menu" onclick="openSidebar()">☰</button>
      <div class="tb-title" id="page-title">Dashboard</div>
      <div class="tb-badge" id="conn-badge">● Online</div>
      <div class="tb-time" id="clock"></div>
    </div>
    <div id="content">
      <!-- Pages injected here -->
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast-container"></div>

<!-- MODALS -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<script>
'use strict';

// ── STATE ──────────────────────────────────────────────────────────────────
let TOKEN = localStorage.getItem('mbt_token') || '';
let USER  = JSON.parse(localStorage.getItem('mbt_user') || 'null');
let CUR_PAGE = 'dashboard';
let PRODUCTS = [];
let CART = [];
let CFG = {};
let CURRENCY = 'KES';

// ── API ────────────────────────────────────────────────────────────────────
async function api(method, path, body, noAuth) {
  const headers = {'Content-Type': 'application/json'};
  if (!noAuth && TOKEN) headers['Authorization'] = 'Bearer ' + TOKEN;
  const opts = {method, headers};
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch('/api' + path, opts);
  const data = await r.json().catch(() => ({}));
  if (r.status === 401 && !noAuth) { logout(); return null; }
  return data;
}
const GET  = (p, q) => api('GET',    p + (q ? '?' + new URLSearchParams(q) : ''));
const POST = (p, b) => api('POST',   p, b);
const PUT  = (p, b) => api('PUT',    p, b);
const DEL  = (p)    => api('DELETE', p);

// ── AUTH ───────────────────────────────────────────────────────────────────
async function doLogin() {
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value;
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('login-error');
  if (!u || !p) { showErr(err, 'Enter username and password.'); return; }
  btn.disabled = true; btn.textContent = 'Signing in…';
  const res = await api('POST', '/auth/login', {username:u, password:p}, true);
  btn.disabled = false; btn.textContent = 'Sign In';
  if (!res || res.error) { showErr(err, res?.error || 'Login failed.'); return; }
  TOKEN = res.token;
  USER  = res.user;
  localStorage.setItem('mbt_token', TOKEN);
  localStorage.setItem('mbt_user',  JSON.stringify(USER));
  initApp();
}
function showErr(el, msg) { el.textContent = msg; el.style.display = 'block'; }

function logout() {
  TOKEN = ''; USER = null;
  localStorage.removeItem('mbt_token');
  localStorage.removeItem('mbt_user');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-pass').value = '';
  document.getElementById('login-error').style.display = 'none';
}

// ── INIT ───────────────────────────────────────────────────────────────────
async function initApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('sb-username').textContent = USER?.full_name || USER?.username || 'Admin';
  document.getElementById('sb-role').textContent = (USER?.role || 'admin').replace('_',' ').toUpperCase();
  document.getElementById('sb-avatar').textContent = (USER?.full_name || USER?.username || 'A')[0].toUpperCase();
  CFG = await GET('/settings') || {};
  CURRENCY = CFG.currency_symbol || 'KES';
  startClock();
  startConnCheck();
  startWS();
  goto('dashboard');
}

function startClock() {
  const el = document.getElementById('clock');
  const tick = () => { el.textContent = new Date().toLocaleTimeString('en-KE', {hour:'2-digit',minute:'2-digit',second:'2-digit'}); };
  tick(); setInterval(tick, 1000);
}

async function startConnCheck() {
  const badge = document.getElementById('conn-badge');
  const check = async () => {
    try {
      const r = await fetch('/api/health', {signal: AbortSignal.timeout(4000)});
      const ok = r.ok;
      badge.textContent = ok ? '● Online' : '● Offline';
      badge.className = 'tb-badge' + (ok ? '' : ' offline');
    } catch { badge.textContent = '● Offline'; badge.className = 'tb-badge offline'; }
  };
  check(); setInterval(check, 15000);
}

// ── TOAST ──────────────────────────────────────────────────────────────────
function toast(msg, type='', dur=3000) {
  const tc = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = 'toast' + (type ? ' ' + type : '');
  t.textContent = msg;
  tc.appendChild(t);

}

function renderProds() {

  });
  const g = document.getElementById('prod-grid');
  if (!g) return;
  if (!filtered.length) { g.innerHTML = '<div class="empty-state"><div class="empty-icon">📦</div><div class="empty-text">No products found</div></div>'; return; }

      <div class="prod-card-name">${esc(p.name)}</div>
      <div class="prod-card-price">${fmt(p.price)}</div>
      <div class="prod-card-stock${low?' low':''}">${inStock ? `${p.stock} ${p.unit||'pcs'} in stock` : 'Out of stock'}</div>

  }).join('');
}

function addToCart(pid) {
  const p = PRODUCTS.find(x => x.id===pid);
  if (!p) return;
  const ex = CART.find(x => x.product_id===pid);
  if (ex) { ex.quantity++; ex.total = round2(ex.quantity * ex.unit_price); }
  else CART.push({product_id:pid, product_name:p.name, sku:p.sku||'', quantity:1, unit_price:+p.price, discount:0, total:+p.price});
  renderCart();
}

function removeFromCart(pid) { CART = CART.filter(x => x.product_id!==pid); renderCart(); }
function parseQty(v, min=0.25) {
  const q = parseFloat(v);
  if (isNaN(q)) return min;
  return Math.max(min, Math.round(q * 4) / 4);
}
function bumpQty(pid, delta) {
  const item = CART.find(x => x.product_id===pid);
  if (item) setQty(pid, item.quantity + delta);
}
function setQty(pid, v) {
  const q = parseQty(v, 0.25);
  const item = CART.find(x => x.product_id===pid);
  if (item) { item.quantity=q; item.total=round2(q*item.unit_price); }
  renderCart();
}

function renderCart() {
  const cl = document.getElementById('cart-list');
  const cc = document.getElementById('cart-count');
  if (!cl) return;
  const n = CART.reduce((s,i)=>s+i.quantity,0);
  if (cc) cc.textContent = `${n} item${n!==1?'s':''}`;
  if (!CART.length) { cl.innerHTML = '<div class="empty-state"><div class="empty-icon">🛒</div><div class="empty-text">Cart is empty</div></div>'; recalc(); return; }
  cl.innerHTML = CART.map(item => `
    <div class="cart-item">
      <div class="cart-item-name" title="${esc(item.product_name)}">${esc(item.product_name)}</div>
      <div class="cart-qty">
        <button class="qty-btn" onclick="bumpQty(${item.product_id},-0.25)">−</button>
        <input class="qty-input" type="number" value="${item.quantity}" min="0.25" step="0.25" onchange="setQty(${item.product_id},this.value)" style="width:48px">
        <button class="qty-btn" onclick="bumpQty(${item.product_id},0.25)">+</button>
      </div>
      <div class="cart-total-line">${CURRENCY} ${item.total.toLocaleString('en-KE',{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
      <button class="cart-rm" onclick="removeFromCart(${item.product_id})">✕</button>
    </div>`).join('');
  recalc();
}

let _totalCalc = 0;
function recalc() {
  const sub = round2(CART.reduce((s,i) => s+i.total, 0));
  const dv = parseFloat(document.getElementById('disc-val')?.value||0)||0;
  const dt = document.getElementById('disc-type')?.value||'KES';
  let dis = dt==='%' ? round2(sub * Math.min(dv,100)/100) : Math.min(dv, sub);
  const taxRate = parseFloat(CFG.tax_rate||0)/100;
  const taxable = Math.max(0, sub-dis);
  const tax = round2(taxable * taxRate);
  const total = round2(taxable + tax);
  _totalCalc = total;
  setText('co-sub', fmt(sub));
  setText('co-tax', fmt(tax));
  setText('co-total', fmt(total));
  updateChange();
}
function updateChange() {
  const paid = parseFloat(document.getElementById('pay-amount')?.value||0)||0;
  const chg = Math.max(0, paid - _totalCalc);
  const ok = paid >= _totalCalc || _totalCalc === 0;
  const el = document.getElementById('pay-change');
  if (el) { el.textContent = fmt(chg); el.style.color = ok ? 'var(--ok)' : 'var(--err)'; }
}
function addAmount(a) {
  const el = document.getElementById('pay-amount');
  if (el) { el.value = round2((parseFloat(el.value)||0) + a); updateChange(); }
}
function setExact() {
  const el = document.getElementById('pay-amount');
  if (el) { el.value = _totalCalc.toFixed(2); updateChange(); }
}
function onPayMethodChange() {
  const m = document.getElementById('pay-method')?.value||'';
  if (m === 'Credit Sale') { const el = document.getElementById('pay-amount'); if (el) { el.value='0'; updateChange(); } }
  const qa = document.getElementById('quick-amounts');
  if (qa) qa.style.display = ['Cash','M-Pesa','Card','Cheque','Part Payment'].includes(m) ? 'flex' : 'none';
}
function clearCart() { CART=[]; document.getElementById('disc-val').value='0'; document.getElementById('pay-amount').value='0'; document.getElementById('sale-note').value=''; renderCart(); }

async function processSale() {
  if (!CART.length) { toast('Add items first.', 'err'); return; }
  const method = document.getElementById('pay-method').value;
  const paid = parseFloat(document.getElementById('pay-amount').value)||0;
  if (!['Part Payment','Credit Sale'].includes(method) && paid < _totalCalc) {
    toast('Amount paid is less than total.', 'err'); return;
  }
  const dv = parseFloat(document.getElementById('disc-val')?.value||0)||0;
  const dt = document.getElementById('disc-type')?.value||'KES';
  const sub = round2(CART.reduce((s,i)=>s+i.total,0));
  let dis = dt==='%' ? round2(sub*Math.min(dv,100)/100) : Math.min(dv,sub);
  const taxRate = parseFloat(CFG.tax_rate||0)/100;
  const taxable = Math.max(0,sub-dis);
  const tax = round2(taxable*taxRate);
  const total = round2(taxable+tax);
  const btn = document.getElementById('charge-btn');
  btn.disabled=true; btn.textContent='Processing…';
  try {
    const res = await POST('/sales', {
      items: CART, subtotal:sub, discount:dis, tax, total,
      payment_method: method.toLowerCase(),
      amount_paid: method==='Credit Sale' ? 0 : paid,
      change_amount: Math.max(0, paid-total),
      notes: document.getElementById('sale-note').value.trim()
    });
    if (res?.success) {
      toast(`✓ Sale recorded — ${res.receipt_number}`, 'ok', 4000);
      if (['Part Payment','Credit Sale'].includes(method)) {
        openDebtInvoiceModal(res.sale_id, res.receipt_number, total, method==='Credit Sale' ? 0 : paid);
      }
      clearCart();
      PRODUCTS = await GET('/products') || [];
      renderProds();
    } else { toast(res?.error || 'Sale failed.', 'err'); }
  } catch(e) { toast('Network error: ' + e.message, 'err'); }
  finally { btn.disabled=false; btn.textContent='✓  CHARGE'; }
}

async function searchCustomersInline(q) {
  if (!q || q.length < 2) { document.getElementById('debt-cust-results').innerHTML = ''; return; }

  const el = document.getElementById('debt-cust-results');
  if (!res.length) { el.innerHTML = '<div style="font-size:12px;color:var(--text3)">No customers found — <a href="#" onclick="goto(\'debt\')">add one</a></div>'; return; }

function selectCustomer(id, name) {
  document.getElementById('debt-cust-id').value = id;
  document.getElementById('debt-cust-search').value = name;
  document.getElementById('debt-cust-results').innerHTML = `<div style="color:var(--ok);font-size:12px;font-weight:600">✓ ${esc(name)} selected</div>`;
}
async function submitDebtInvoice(sale_id, receipt_number) {
  const cid = document.getElementById('debt-cust-id').value;
  if (!cid) { toast('Select a customer first.', 'err'); return; }
  const total = parseFloat(document.getElementById('debt-total').value)||0;
  const paid  = parseFloat(document.getElementById('debt-paid').value)||0;
  const due   = document.getElementById('debt-due').value;
  const res = await POST('/debt/invoices', {customer_id:+cid, sale_id, receipt_number, total_amount:total, amount_paid:paid, due_date:due||null});
  if (res?.success) { toast(`✓ Invoice ${res.invoice_number} created. Balance: ${fmt(res.balance)}`, 'ok', 5000); closeModal(); }

async function inventory() {
  PRODUCTS = await GET('/products') || [];
  const c = document.getElementById('content');
  c.innerHTML = `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px">
    <div class="search-bar" style="flex:1;max-width:360px"><input type="text" id="inv-search" placeholder="Search products…" oninput="renderInv()"></div>

  <div style="margin-top:10px;font-size:12px;color:var(--text3)" id="inv-stats"></div>`;
  renderInv();
}
function renderInv() {
  const q = (document.getElementById('inv-search')?.value||'').toLowerCase();
  const filtered = PRODUCTS.filter(p => !q || p.name.toLowerCase().includes(q) || (p.sku||'').toLowerCase().includes(q) || (p.category||'').toLowerCase().includes(q));
  const el = document.getElementById('inv-table');
  const st = document.getElementById('inv-stats');
  if (!el) return;
  if (!filtered.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">📦</div><div class="empty-text">No products found</div></div>'; return; }
  el.innerHTML = `<table><thead><tr><th>Name</th><th>SKU</th><th>Category</th><th>Price</th><th>Cost</th><th>Stock</th><th>Actions</th></tr></thead><tbody>${
    filtered.map(p => {
      const low = +p.stock <= +p.min_stock;
      return `<tr>
        <td><strong>${esc(p.name)}</strong></td>
        <td style="color:var(--text3)">${esc(p.sku||'')}</td>
        <td>${esc(p.category||'')}</td>
        <td style="font-weight:700">${fmt(p.price)}</td>
        <td style="color:var(--text2)">${fmt(p.cost_price||0)}</td>
        <td><span class="badge badge-${+p.stock===0?'err':low?'warn':'ok'}">${p.stock} ${esc(p.unit||'pcs')}</span></td>
        <td><div class="table-actions">
          <button class="btn btn-sm btn-secondary" onclick="prodModal(${p.id})">Edit</button>
          <button class="btn btn-sm btn-secondary" onclick="adjustStockModal(${p.id})">Stock</button>
        </div></td>
      </tr>`;
    }).join('')
  }</tbody></table>`;
  if (st) {
    const total = filtered.reduce((s,p)=>s+(+p.price||0)*(+p.stock||0),0);
    const low = filtered.filter(p=>+p.stock<=+p.min_stock).length;
    st.textContent = `${filtered.length} products · ${low} low stock · Stock value: ${fmt(total)}`;
  }
}

function prodModal(pid) {

  openModal(p ? 'Edit Product' : 'Add Product', `
    <div class="form-row">

async function saveProduct(pid) {
  const name = document.getElementById('pm-name')?.value.trim();
  if (!name) { toast('Name is required.', 'err'); return; }
  const data = {
    name, sku: document.getElementById('pm-sku').value.trim()||null,
    category: document.getElementById('pm-cat').value.trim()||null,
    unit: document.getElementById('pm-unit').value.trim()||'pcs',
    price: parseFloat(document.getElementById('pm-price').value)||0,
    cost_price: parseFloat(document.getElementById('pm-cost').value)||0,
    min_stock: parseInt(document.getElementById('pm-min').value)||5,
  };
  if (!pid) data.stock = parseFloat(document.getElementById('pm-stock')?.value)||0;
  const res = pid ? await PUT(`/products/${pid}`, data) : await POST('/products', data);
  if (res?.success) { toast(pid?'Product updated.':'Product added.','ok'); closeModal(); PRODUCTS=await GET('/products')||[]; renderInv(); }
  else toast(res?.error||'Failed.','err');
}

function adjustStockModal(pid) {
  const p = PRODUCTS.find(x=>x.id===pid);
  if (!p) return;
  openModal('Adjust Stock — ' + p.name, `
    <div style="margin-bottom:16px;padding:12px;background:var(--surface2);border-radius:8px">
      <div style="font-size:12px;color:var(--text2)">Current stock</div>

    </div>
    <div class="form-group"><label class="form-label">New Quantity</label><input type="number" id="adj-qty" value="${p.stock}" min="0" step="0.25"></div>
    <div class="form-group"><label class="form-label">Reason *</label><input type="text" id="adj-reason" placeholder="e.g. Stock count correction, Received delivery…"></div>`,
    `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
     <button class="btn btn-primary" onclick="saveStockAdj(${pid})">Save Adjustment</button>`
  );
}
async function saveStockAdj(pid) {
  const qty = parseFloat(document.getElementById('adj-qty')?.value)||0;
  const reason = document.getElementById('adj-reason')?.value.trim();
  if (!reason) { toast('Reason is required.','err'); return; }
  const res = await POST(`/products/${pid}/adjust`, {new_qty:qty, reason});
  if (res?.success) { toast(`Stock adjusted: ${res.old_stock} → ${res.new_stock}`,'ok'); closeModal(); PRODUCTS=await GET('/products')||[]; renderInv(); }
  else toast(res?.error||'Failed.','err');
}

function filterDebtInv() {

    return true;
  });
  const el = document.getElementById('inv-tbl');
  if (!el) return;
  el.innerHTML = `<table><thead><tr><th>Invoice</th><th>Customer</th><th>Total</th><th>Paid</th><th>Balance</th><th>Status</th><th>Due</th><th>Actions</th></tr></thead><tbody>${

      const today = new Date().toISOString().slice(0,10);
      let status = i.status;
      if (status !== 'paid' && status !== 'cancelled' && i.due_date && i.due_date < today) status='overdue';

        <td style="font-weight:600">${esc(i.invoice_number)}</td>

      </tr>`;
    }).join('') || '<tr><td colspan="8" style="text-align:center;padding:30px;color:var(--text3)">No invoices found</td></tr>'
  }</tbody></table>`;
}

function collectPaymentModal(inv_id, inv_num, cust_name, balance) {
  if (inv_id) {
    openModal('Collect Payment', `

        <div style="font-weight:700">${esc(cust_name)}</div>

        <div style="font-size:22px;font-weight:800;color:var(--err);margin-top:4px">${fmt(balance)} due</div>
      </div>
      <div class="form-group"><label class="form-label">Payment Amount *</label><input type="number" id="cp-amount" value="${balance}" min="0.01" step="0.01"></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Method</label><select id="cp-method"><option>Cash</option><option>M-Pesa</option><option>Card</option></select></div>
        <div class="form-group"><label class="form-label">Notes</label><input type="text" id="cp-notes" placeholder="Optional…"></div>
      </div>`,
      `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
       <button class="btn btn-success" onclick="submitPayment(${inv_id})">Collect</button>`
    );
  } else {
    // Must pick invoice from list
    const pending = (window._allInvoices||[]).filter(i=>i.status!=='paid'&&i.status!=='cancelled');
    openModal('Collect Debt Payment', `
      <div class="form-group"><label class="form-label">Invoice *</label>
        <select id="cp-inv" style="width:100%" onchange="onCPInvChange()"><option value="">Select invoice…</option>${pending.map(i=>`<option value="${i.id}" data-balance="${i.balance}">${esc(i.invoice_number)} — ${esc(i.customer_name)} — ${fmt(i.balance)}</option>`).join('')}</select>
      </div>
      <div class="form-group"><label class="form-label">Amount *</label><input type="number" id="cp-amount" value="0" min="0.01" step="0.01"></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Method</label><select id="cp-method"><option>Cash</option><option>M-Pesa</option><option>Card</option></select></div>
        <div class="form-group"><label class="form-label">Notes</label><input type="text" id="cp-notes"></div>
      </div>`,
      `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
       <button class="btn btn-success" onclick="submitPaymentFromModal()">Collect</button>`
    );
  }
}
function onCPInvChange() {
  const sel = document.getElementById('cp-inv');
  const opt = sel?.options[sel.selectedIndex];
  const bal = opt?.dataset?.balance || '0';
  const el = document.getElementById('cp-amount');
  if (el) el.value = parseFloat(bal).toFixed(2);
}
async function submitPayment(inv_id) {
  const amount = parseFloat(document.getElementById('cp-amount').value)||0;
  if (amount<=0) { toast('Amount must be > 0.','err'); return; }
  const method = document.getElementById('cp-method').value;
  const notes  = document.getElementById('cp-notes')?.value||'';
  const res = await POST(`/debt/invoices/${inv_id}/pay`, {amount, payment_method:method.toLowerCase(), notes});
  if (res?.success) { toast(`✓ Payment recorded — ${res.payment_receipt}. Balance: ${fmt(res.balance_after)}`,'ok',5000); closeModal(); debtTab('invoices',null); }
  else toast(res?.error||'Failed.','err');
}
async function submitPaymentFromModal() {
  const inv_id = parseInt(document.getElementById('cp-inv')?.value)||0;
  if (!inv_id) { toast('Select an invoice.','err'); return; }
  await submitPayment(inv_id);
}

      </div>
    </div>

    `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>

async function saveUser(uid) {
  const username = document.getElementById('um-user')?.value.trim();
  const pass = document.getElementById('um-pass')?.value;
  const role = document.getElementById('um-role')?.value;
  const full_name = document.getElementById('um-name')?.value.trim();
  if (!uid && !username) { toast('Username required.','err'); return; }
  if (!uid && !pass) { toast('Password required for new user.','err'); return; }
  const data = {role, full_name};
  if (pass) data.password = pass;
  if (!uid) data.username = username;
  if (uid) { data.is_active = parseInt(document.getElementById('um-active')?.value)||1; }
  const res = uid ? await PUT(`/users/${uid}`, data) : await POST('/users', data);
  if (res?.success) { toast(uid?'User updated.':'User created.','ok'); closeModal(); users(); }
  else toast(res?.error||'Failed.','err');
}

// ── UTILITIES ──────────────────────────────────────────────────────────────
function round2(n) { return Math.round((+n||0)*100)/100; }
function fmtQty(n) {
  const v = parseFloat(n);
  if (isNaN(v)) return '0';
  return Number.isInteger(v) ? String(v) : parseFloat(v.toFixed(4)).toString();
}
function setText(id, v) { const el=document.getElementById(id); if(el) el.textContent=v; }

// ── WEBSOCKET — live state from bot-style push ─────────────────────────────
let _ws = null;
let _wsRetry = null;
let _wsConnected = false;
const WS_ENABLED = false; // Backend has no /ws route in current POS build.

function startWS() {
  if (!TOKEN) return;
  if (!WS_ENABLED) {
    _wsConnected = false;
    const badge = document.getElementById('conn-badge');
    if (badge) { badge.textContent = '⬤ Polling'; badge.className = 'tb-badge polling'; }
    return;
  }
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const url   = proto + '//' + location.host + '/ws';
  try {
    _ws = new WebSocket(url);

    _ws.onopen = () => {
      _ws.send(JSON.stringify({token: TOKEN}));
    };

    _ws.onmessage = (e) => {
      try {
        const d = JSON.parse(e.data);
        if (d.error === 'unauthorized') { logout(); return; }
        if (d.type !== 'state') return;
        _wsConnected = true;
        // Update connection badge
        const badge = document.getElementById('conn-badge');
        if (badge) { badge.textContent = '⬤ Live'; badge.className = 'tb-badge live'; }
        // Push live data to dashboard if visible
        if (CUR_PAGE === 'dashboard') applyWSState(d);
      } catch(err) {}
    };

    _ws.onclose = () => {
      _wsConnected = false;
      const badge = document.getElementById('conn-badge');
      if (badge) { badge.textContent = '⬤ Polling'; badge.className = 'tb-badge polling'; }
      clearTimeout(_wsRetry);
      _wsRetry = setTimeout(startWS, 5000);
    };

    _ws.onerror = () => { _ws.close(); };
  } catch(err) {
    clearTimeout(_wsRetry);
    _wsRetry = setTimeout(startWS, 5000);
  }
}

function applyWSState(d) {
  // Live-update KPI cards on dashboard without full reload
  setText('ws-sales',   String(d.today_sales || 0));
  setText('ws-rev',     fmt(d.today_rev || 0));
  setText('ws-low',     String(d.low_stock || 0));
  setText('ws-debt',    fmt(d.debt_out || 0));
  setText('ws-col',     fmt(d.debt_today || 0));
  const rs = d.recent_sale;
  const el = document.getElementById('ws-recent');
  if (el && rs) {
    el.textContent = rs.receipt_number + '  ' + fmt(rs.total) + '  (' + (rs.payment_method||'') + ')';
  }
}
