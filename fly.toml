app = 'mbt-trading'
primary_region = 'jnb'

[build]
  dockerfile = 'deploy/Dockerfile'

[env]
  MBT_DATA_ROOT = '/data'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = 'mbt_data'
  destination = '/data'
  initial_size = '1gb'
